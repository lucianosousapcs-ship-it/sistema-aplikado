<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikado - Conexões</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0d11;
            font-family: 'Inter', sans-serif;
            color: white;
            padding: 20px;
        }
        .topbar {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            background: #0f1318;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 30px;
        }
        .logo { font-family: 'Poppins', sans-serif; font-size: 28px; font-weight: 900; }
        .logo span { color: #f2c200; }
        .btn-back {
            background: #1a1f26;
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #11151b;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 30px;
        }
        h2 {
            color: #f2c200;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            background: #1a1f26;
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            border-radius: 8px;
        }
        button {
            background: #f2c200;
            color: #111;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .log-area {
            margin-top: 30px;
            padding: 15px;
            background: #0b0d11;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="logo">Apli<span>kado</span></div>
        <a href="nova-home.html" class="btn-back">VOLTAR</a>
    </div>
    <div class="container">
        <h2>🔌 CONEXÕES - Configuração de Importação</h2>
        <p style="margin-bottom: 20px; color: rgba(255,255,255,0.6);">Defina como os relatórios CSV/PDF serão importados para o sistema.</p>

        <div class="form-group">
            <label>Tipo de Relatório</label>
            <select>
                <option>Títulos por Operação</option>
                <option>Relatório de Estoque</option>
                <option>Extrato Financeiro</option>
            </select>
        </div>

        <div class="form-group">
            <label>Caminho da Pasta (no computador)</label>
            <input type="text" placeholder="Ex: C:\Relatórios\Pegaso">
        </div>

        <div class="form-group">
            <label>Mapeamento de Colunas (simplificado)</label>
            <input type="text" placeholder="Ex: Coluna A → descricao, Coluna B → codigo">
        </div>

        <div class="form-group">
            <label>Frequência de Importação</label>
            <select>
                <option>Após gerar relatório (manual)</option>
                <option>A cada 5 minutos</option>
                <option>A cada 30 minutos</option>
                <option>Horário fixo (ex: 07:00)</option>
            </select>
        </div>

        <button onclick="alert('Em desenvolvimento: as configurações serão salvas no Supabase.')">SALVAR CONFIGURAÇÕES</button>

        <div class="log-area">
            <strong>📋 Últimas importações:</strong><br>
            (nenhuma importação realizada ainda)
        </div>
    </div>
</body>
</html>
