<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikado - Conexões</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0d11;
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: #11151b;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 50px;
            max-width: 600px;
            margin: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #f2c200;
        }
        p {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
            line-height: 1.5;
        }
        button {
            background: #f2c200;
            color: #111;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            background: #ffda44;
        }
        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 20px;
        }
        .logo span { color: #f2c200; }
    </style>
</head>
<body>
    <div class="logo">Apli<span>kado</span></div>
    <div class="container">
        <h1>🔌 CONEXÕES</h1>
        <p>Em desenvolvimento.<br><br>Em breve você poderá:<br>
        ✅ Configurar a pasta de origem dos relatórios<br>
        ✅ Mapear colunas do CSV para o sistema<br>
        ✅ Definir horários de importação automática<br>
        ✅ Conectar com banco de dados online (Supabase)</p>
        <button onclick="window.location.href='nova-home.html'">VOLTAR</button>
    </div>
</body>
</html>
