<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikado - Início</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0d11;
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 40px;
        }
        .logo span { color: #f2c200; }
        .cards {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background: #11151b;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px 50px;
            width: 320px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .card:hover {
            transform: translateY(-10px);
            border-color: #f2c200;
            box-shadow: 0 15px 30px rgba(242,194,0,0.1);
        }
        .card h2 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #f2c200;
        }
        .card p {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }
        .footer {
            margin-top: 50px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }
        a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
    </style>
</head>
<body>
    <div class="logo">Apli<span>kado</span></div>
    <div class="cards">
        <a href="modulo2.html">
            <div class="card">
                <h2>📊 MÓDULO II</h2>
                <p>Planejamento de Compras<br>Curva ABC, necessidades e relatórios</p>
            </div>
        </a>
        <a href="conexoes.html">
            <div class="card">
                <h2>🔌 CONEXÕES</h2>
                <p>Configurar importação automática<br>de relatórios e integração com banco</p>
            </div>
        </a>
    </div>
    <div class="footer">Pégaso Consultoria | Aplikado soluções</div>
</body>
</html>
